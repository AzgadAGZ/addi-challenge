{{- if eq .Values.workloadType "cronjob" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "addi-workload.fullname" . }}
  namespace: {{ include "addi-workload.namespace" . }}
  labels:
    {{- include "addi-workload.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "addi-workload.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: {{ .Values.name }}
              image: {{ .Values.image.repository }}/{{ .Values.name }}:{{ .Values.image.tag }}
              {{- if .Values.command }}
              command: {{ toJson .Values.command }}
              {{- end }}
              {{- if .Values.args }}
              args: {{ toJson .Values.args }}
              {{- end }}
              {{- if .Values.env }}
              env:
                {{- range $key, $val := .Values.env }}
                - name: {{ $key }}
                  value: {{ $val | quote }}
                {{- end }}
              {{- end }}
              {{- if .Values.secrets }}
              envFrom:
                - secretRef:
                    name: {{ include "addi-workload.fullname" . }}-secrets
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              securityContext:
                runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
                readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
                allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
                capabilities:
                  drop: {{ .Values.securityContext.capabilities.drop | toJson }}
          securityContext:
            seccompProfile:
              type: {{ .Values.securityContext.seccompProfile.type }}
          {{- if .Values.spot }}
          tolerations:
            - key: "kubernetes.azure.com/scalesetpriority"
              operator: "Equal"
              value: "spot"
              effect: "NoSchedule"
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: "kubernetes.azure.com/scalesetpriority"
                        operator: In
                        values:
                          - "spot"
          {{- end }}
          {{- if .Values.priorityClass }}
          priorityClassName: {{ .Values.priorityClass }}
          {{- end }}
{{- end }}
