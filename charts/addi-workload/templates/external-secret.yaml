{{- if .Values.secrets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "addi-workload.fullname" . }}-secrets
  namespace: {{ include "addi-workload.namespace" . }}
  labels:
    {{- include "addi-workload.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ (index .Values.secrets 0).provider | default "aws-secrets-manager" }}
    kind: ClusterSecretStore
  target:
    name: {{ include "addi-workload.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.secrets }}
    - secretKey: {{ .key }}
      remoteRef:
        key: {{ .key }}
    {{- end }}
{{- end }}
