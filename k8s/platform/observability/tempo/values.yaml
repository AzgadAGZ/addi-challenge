# Grafana Tempo - Helm values
# S3 backend for trace storage
# 10% sampling rate at 1000 services scale
# Multi-tenant: "addi" org

tempo:
  reportingEnabled: false

  storage:
    trace:
      backend: s3
      s3:
        bucket: "${TEMPO_TRACES_BUCKET}"
        region: us-east-1
        endpoint: s3.amazonaws.com
        forcepathstyle: false
      blocklist_poll: 5m
      wal:
        path: /var/tempo/wal

  # Trace retention - 30 days (longer for prod incidents)
  compactor:
    compaction:
      block_retention: 720h  # 30 days

  # Ingester - buffer before S3 flush
  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m
    flush_check_period: 10s

  querier:
    max_concurrent_queries: 20
    search:
      max_result_limit: 10000

  limits_config:
    max_traces_per_user: 10000000
    max_bytes_per_trace: 5000000
    ingestion_rate_strategy: global
    ingestion_rate_limit_bytes: 15000000
    ingestion_burst_size_bytes: 20000000

# Microservices mode
distributor:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

ingester:
  replicas: 3
  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

querier:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

queryFrontend:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

compactor:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# MinIO disabled - using AWS S3
minio:
  enabled: false

# Monitoring
serviceMonitor:
  enabled: true
