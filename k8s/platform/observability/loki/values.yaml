# Grafana Loki - Helm values
# Microservices mode for 1000-service scale (~30TB/mo log volume)
# S3 backend for log storage (SFC data residency - AWS us-east-1)
# Multi-tenant: all Addi services in "addi" tenant

loki:
  auth_enabled: true

  # S3 storage backend
  storage:
    type: s3
    s3:
      region: us-east-1
      bucketnames: "${LOKI_CHUNKS_BUCKET}"
      s3forcepathstyle: false
      sse_config:
        type: SSE-KMS
        kms_key_id: "${LOKI_KMS_KEY_ID}"

  # Schema config (TSDB for performance at scale)
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # Retention - 90 days (SFC audit requirement)
  limits_config:
    retention_period: 2160h  # 90 days
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 20MB
    max_global_streams_per_user: 50000
    max_line_size: 256KB
    reject_old_samples: true
    reject_old_samples_max_age: 168h

  # Compactor for retention enforcement
  compactor:
    working_directory: /data/retention
    retention_enabled: true
    retention_delete_delay: 2h

  # Ruler for alerting
  rulerConfig:
    storage:
      type: s3
      s3:
        bucketnames: "${LOKI_RULER_BUCKET}"
        region: us-east-1

# Microservices mode
deploymentMode: Distributed

# Component replicas
distributor:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

ingester:
  replicas: 6
  persistence:
    enabled: true
    size: 20Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

querier:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

queryFrontend:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

queryScheduler:
  enabled: true
  replicas: 2

compactor:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
    storageClass: gp3

indexGateway:
  enabled: true
  replicas: 2
  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp3

bloomCompactor:
  enabled: false

ruler:
  enabled: true
  replicas: 2

# MinIO disabled - using AWS S3
minio:
  enabled: false

# Monitoring
monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: true

# Backend mode disabled in distributed
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
