# Grafana - Helm values
# HA mode with RDS PostgreSQL backend (state persistence across pods)
# OIDC: Google Workspace / Okta placeholder
# Hubble metrics dashboards, LGTM dashboards auto-provisioned

replicas: 3

# RDS PostgreSQL for HA state (sessions, dashboards, alerts)
# Grafana docs: https://grafana.com/docs/grafana/latest/setup-grafana/set-up-for-high-availability/
grafana.ini:
  # Server
  server:
    domain: grafana.internal.addi.com
    root_url: "https://grafana.internal.addi.com"
    serve_from_sub_path: false

  # Database - RDS PostgreSQL (HA-capable, no SQLite)
  database:
    type: postgres
    host: "${GRAFANA_DB_HOST}:5432"
    name: grafana
    user: grafana
    password: "${GRAFANA_DB_PASSWORD}"
    ssl_mode: require
    max_open_conn: 100
    max_idle_conn: 10
    conn_max_lifetime: 14400

  # Session storage - Redis (shared across replicas)
  session:
    provider: redis
    provider_config: "addr=${GRAFANA_REDIS_HOST}:6379,pool_size=100,db=0"

  # OIDC - Google Workspace / Okta placeholder
  # Replace clientID and clientSecret via ExternalSecrets
  auth:
    disable_login_form: true
    oauth_auto_login: false
    signout_redirect_url: ""

  "auth.generic_oauth":
    enabled: true
    name: "SSO"
    allow_sign_up: false
    auto_login: false
    client_id: "${GRAFANA_OIDC_CLIENT_ID}"
    client_secret: "${GRAFANA_OIDC_CLIENT_SECRET}"
    scopes: "openid profile email groups"
    auth_url: "${GRAFANA_OIDC_AUTH_URL}"
    token_url: "${GRAFANA_OIDC_TOKEN_URL}"
    api_url: "${GRAFANA_OIDC_USERINFO_URL}"
    groups_attribute_path: groups
    role_attribute_path: "contains(groups[*], 'addi:platform-engineering') && 'Admin' || contains(groups[*], 'addi:security') && 'Admin' || 'Viewer'"
    teams_url: ""

  # Security
  security:
    admin_password: "${GRAFANA_ADMIN_PASSWORD}"
    secret_key: "${GRAFANA_SECRET_KEY}"
    disable_gravatar: true
    cookie_secure: true
    cookie_samesite: strict
    content_security_policy: true

  # Analytics - disabled (data sovereignty)
  analytics:
    reporting_enabled: false
    check_for_updates: false

  # Feature toggles
  feature_toggles:
    enable: traceqlEditor tempoBackendSearch

# Data sources (auto-provisioned)
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        url: "http://mimir-query-frontend.observability.svc.cluster.local:8080/prometheus"
        access: proxy
        isDefault: true
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: addi

      - name: Loki
        type: loki
        url: "http://loki-query-frontend.observability.svc.cluster.local:3100"
        access: proxy
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: addi

      - name: Tempo
        type: tempo
        url: "http://tempo-query-frontend.observability.svc.cluster.local:3200"
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          serviceMap:
            datasourceUid: mimir
          lokiSearch:
            datasourceUid: loki

# Dashboard provisioning (from ConfigMaps)
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: platform
        orgId: 1
        folder: Platform
        type: file
        disableDeletion: true
        options:
          path: /var/lib/grafana/dashboards/platform
      - name: services
        orgId: 1
        folder: Services
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/services

# Resources
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Persistence disabled - using RDS + ConfigMap for state
persistence:
  enabled: false

# Monitoring
serviceMonitor:
  enabled: true

# Anti-affinity for HA
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - grafana
        topologyKey: kubernetes.io/hostname
