apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-registries
  labels:
    app.kubernetes.io/managed-by: platform-engineering
    addi.com/tier: platform
    addi.com/compliance: "sfc-ce-007-2018"
  annotations:
    policies.kyverno.io/title: Restrict Container Registries
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: |
      Container images may only be pulled from:
      - ghcr.io/addi/* - Addi's internal GHCR registry (signed images)
      - public.ecr.aws/* - AWS public ECR (base images, platform tools)
      All other registries are blocked.
      SFC CE 007/2018: trusted source enforcement.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: restrict-image-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      validate:
        message: |
          Images must come from approved registries:
          ghcr.io/addi/* or public.ecr.aws/*.
          Current image "{{request.object.spec.containers[].image}}" is not allowed.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{element.image}}"
                    operator: NotEquals
                    value: "ghcr.io/addi/*"
                  - key: "{{element.image}}"
                    operator: NotEquals
                    value: "public.ecr.aws/*"
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                all:
                  - key: "{{element.image}}"
                    operator: NotEquals
                    value: "ghcr.io/addi/*"
                  - key: "{{element.image}}"
                    operator: NotEquals
                    value: "public.ecr.aws/*"
          - list: "request.object.spec.ephemeralContainers"
            deny:
              conditions:
                all:
                  - key: "{{element.image}}"
                    operator: NotEquals
                    value: "ghcr.io/addi/*"
                  - key: "{{element.image}}"
                    operator: NotEquals
                    value: "public.ecr.aws/*"
