apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-resource-limits
  labels:
    app.kubernetes.io/managed-by: platform-engineering
    addi.com/tier: platform
  annotations:
    policies.kyverno.io/title: Enforce Resource Requests and Limits
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: |
      All containers must declare CPU and memory requests and limits.
      Prevents resource starvation across 1000+ services on shared nodes.
      Required for Karpenter right-sizing to work correctly.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - cilium
                - kyverno
      validate:
        message: |
          All containers must set CPU and memory requests AND limits.
          Example: resources.requests.cpu, resources.requests.memory,
          resources.limits.cpu, resources.limits.memory.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
            =(initContainers):
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
