apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny-all
  labels:
    app.kubernetes.io/managed-by: platform-engineering
    addi.com/tier: platform
    addi.com/compliance: "sfc-ce-007-2018"
  annotations:
    addi.com/description: |
      Cluster-wide default-deny policy.
      All ingress and egress traffic is denied by default.
      Services must have explicit CiliumNetworkPolicy to communicate.
      Exception: DNS (UDP 53) is allowed cluster-wide for service discovery.
      SFC CE 007/2018: network segmentation - least-privilege communication.
spec:
  endpointSelector: {}

  # DENY all ingress by default
  # Services must add their own CiliumNetworkPolicy to allow specific sources
  ingress: []

  # DENY all egress by default
  # Allow only DNS (required for service discovery via CoreDNS)
  egress:
    # Allow DNS - CoreDNS (UDP + TCP 53)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
---
# Allow kube-system components to communicate freely
# (kubelet, CoreDNS, aws-vpc-cni, Karpenter)
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-kube-system
  labels:
    app.kubernetes.io/managed-by: platform-engineering
    addi.com/tier: platform
  annotations:
    addi.com/description: |
      Allow kube-system namespace unrestricted communication.
      Required for Kubernetes control plane components to function.
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: kube-system

  ingress:
    - {}

  egress:
    - {}
---
# Allow cilium/observability namespace communication
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-platform-namespaces
  labels:
    app.kubernetes.io/managed-by: platform-engineering
    addi.com/tier: platform
  annotations:
    addi.com/description: |
      Allow platform namespaces (cilium, observability, argocd, kargo, kyverno)
      to communicate with all pods for health checks, metrics scraping, policy enforcement.
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
          - cilium
          - observability
          - argocd
          - kargo
          - kyverno
          - argo-rollouts

  ingress:
    - {}

  egress:
    - {}
